[workspace]
resolver = "2"

members = [
    "soroban-sdk",
    "soroban-sdk-macros",
    "soroban-meta",
    "soroban-spec",
    "soroban-spec-rust",
    "soroban-ledger-snapshot",
    "soroban-token-sdk",
    "soroban-token-spec",
    "stellar-asset-spec",
    "tests/*",
]

[workspace.package]
version = "27.0.0-rc.1"
rust-version = "1.91.0"

[workspace.dependencies]
soroban-sdk = { version = "27.0.0-rc.1", path = "soroban-sdk" }
soroban-sdk-macros = { version = "27.0.0-rc.1", path = "soroban-sdk-macros" }
soroban-meta = { version = "27.0.0-rc.1", path = "soroban-meta" }
soroban-spec = { version = "27.0.0-rc.1", path = "soroban-spec" }
soroban-spec-rust = { version = "27.0.0-rc.1", path = "soroban-spec-rust" }
soroban-ledger-snapshot = { version = "27.0.0-rc.1", path = "soroban-ledger-snapshot" }
soroban-token-sdk = { version = "27.0.0-rc.1", path = "soroban-token-sdk" }
soroban-token-spec = { version = "27.0.0-rc.1", path = "soroban-token-spec" }
stellar-asset-spec = { version = "27.0.0-rc.1", path = "stellar-asset-spec" }

# CAP-0084 pre-release pins: rs-soroban-env#1695 (fork branch p28-cap-0084).
# `next` enables env's CAP-0084 handling (SAC muxed-contract path +
# ScAddress::MuxedContract match arms in soroban-env-host) and, via
# soroban-env-common, stellar-xdr/cap_0083,cap_0084. Drop the fork pin and
# `next` once CAP-0084 lands on stellar tags.
[workspace.dependencies.soroban-env-common]
version = "27"
git = "https://github.com/sisuresh/rs-stellar-contract-env"
rev = "dd545ff1f23850b13a48f0bd7bfd2cd67206a4ca"
features = ["next"]

[workspace.dependencies.soroban-env-guest]
version = "27"
git = "https://github.com/sisuresh/rs-stellar-contract-env"
rev = "dd545ff1f23850b13a48f0bd7bfd2cd67206a4ca"
features = ["next"]

[workspace.dependencies.soroban-env-host]
version = "27"
git = "https://github.com/sisuresh/rs-stellar-contract-env"
rev = "dd545ff1f23850b13a48f0bd7bfd2cd67206a4ca"
features = ["next"]

[workspace.dependencies.stellar-strkey]
version = "=0.0.16"

# CAP-0084 pre-release pin: rs-stellar-xdr#548 (fork branch p28-cap-0084).
# Per-cap-feature layout. Same source+rev as soroban-env-common's stellar-xdr
# pin -> unified crate instance.
[workspace.dependencies.stellar-xdr]
version = "27"
git = "https://github.com/sisuresh/rs-stellar-xdr"
rev = "bd30d420ce6f63ccd9360e371830384cb84d1c04"
default-features = false
features = ["cap_0083", "cap_0084"]

#[patch.crates-io]
#soroban-env-common = { path = "../rs-soroban-env/soroban-env-common" }
#soroban-env-guest = { path = "../rs-soroban-env/soroban-env-guest" }
#soroban-env-host = { path = "../rs-soroban-env/soroban-env-host" }
#[patch."https://github.com/stellar/rs-stellar-xdr"]
#stellar-xdr = { path = "../rs-stellar-xdr/" }

[profile.dev]
overflow-checks = true
panic = "abort"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true

# The release-without-lto profile is useful for testing build cases when lto
# are disabled, such as those like the test_zero test vector. See the test_zero
# README for more details.
[profile.release-without-lto]
inherits = "release"
lto = "off"

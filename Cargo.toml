[workspace]
resolver = "2"

members = [
    "soroban-sdk",
    "soroban-sdk-macros",
    "soroban-spec",
    "soroban-spec-rust",
    "soroban-ledger-snapshot",
    "soroban-token-sdk",
    "tests/*",
]

[workspace.package]
version = "22.0.8"
rust-version = "1.84.0"

[workspace.dependencies]
soroban-sdk = { version = "22.0.8", path = "soroban-sdk" }
soroban-sdk-macros = { version = "22.0.8", path = "soroban-sdk-macros" }
soroban-spec = { version = "22.0.8", path = "soroban-spec" }
soroban-spec-rust = { version = "22.0.8", path = "soroban-spec-rust" }
soroban-ledger-snapshot = { version = "22.0.8", path = "soroban-ledger-snapshot" }
soroban-token-sdk = { version = "22.0.8", path = "soroban-token-sdk" }

[workspace.dependencies.soroban-env-common]
version = "=23.0.0"
git = "https://github.com/stellar/rs-soroban-env"
rev = "02d4b525f9231d8b82dadde9d06224099405be1d"

[workspace.dependencies.soroban-env-guest]
version = "=23.0.0"
git = "https://github.com/stellar/rs-soroban-env"
rev = "02d4b525f9231d8b82dadde9d06224099405be1d"

[workspace.dependencies.soroban-env-host]
version = "=23.0.0"
git = "https://github.com/stellar/rs-soroban-env"
rev = "02d4b525f9231d8b82dadde9d06224099405be1d"

[workspace.dependencies.stellar-strkey]
version = "=0.0.13"

[workspace.dependencies.stellar-xdr]
version = "=22.1.0"
default-features = false
features = ["curr"]
git = "https://github.com/stellar/rs-stellar-xdr"
rev = "fdd0c4f467ea654c3aaf139e8e914e1c416a39b8"

#[patch.crates-io]
#soroban-env-common = { path = "../rs-soroban-env/soroban-env-common" }
#soroban-env-guest = { path = "../rs-soroban-env/soroban-env-guest" }
#soroban-env-host = { path = "../rs-soroban-env/soroban-env-host" }
#[patch."https://github.com/stellar/rs-stellar-xdr"]
#stellar-xdr = { path = "../rs-stellar-xdr/" }

[profile.dev]
overflow-checks = true
panic = "abort"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true

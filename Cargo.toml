[workspace]
resolver = "2"

members = [
    "soroban-sdk",
    "soroban-sdk-macros",
    "soroban-meta",
    "soroban-spec",
    "soroban-spec-rust",
    "soroban-ledger-snapshot",
    "soroban-token-sdk",
    "soroban-token-spec",
    "stellar-asset-spec",
    "tests/*",
]

[workspace.package]
version = "27.0.0-rc.1"
rust-version = "1.91.0"

[workspace.dependencies]
soroban-sdk = { version = "27.0.0-rc.1", path = "soroban-sdk" }
soroban-sdk-macros = { version = "27.0.0-rc.1", path = "soroban-sdk-macros" }
soroban-meta = { version = "27.0.0-rc.1", path = "soroban-meta" }
soroban-spec = { version = "27.0.0-rc.1", path = "soroban-spec" }
soroban-spec-rust = { version = "27.0.0-rc.1", path = "soroban-spec-rust" }
soroban-ledger-snapshot = { version = "27.0.0-rc.1", path = "soroban-ledger-snapshot" }
soroban-token-sdk = { version = "27.0.0-rc.1", path = "soroban-token-sdk" }
soroban-token-spec = { version = "27.0.0-rc.1", path = "soroban-token-spec" }
stellar-asset-spec = { version = "27.0.0-rc.1", path = "stellar-asset-spec" }

# SPIKE: Protocol 28 (CAP-0084) pins the three env crates to the unmerged
# rs-soroban-env#1700 branch commit, hosted on the sisuresh/rs-soroban-env fork
# branch. cargo-deny matches the literal git-URL org, so deny.toml's
# [sources.allow-org] temporarily includes "sisuresh" for the SPIKE (revert to
# just ["stellar"] once the pins re-point to merged stellar/ revs).
# Version constraints are relaxed off the exact `=` pin per
# lessons.md:45 — the git-rev package may self-report a differing
# patch/prerelease version; keep major-version compatibility.
# Productionize -> stellar/rs-soroban-env merged SHA (or a released version)
# once it lands; restore `version =` only.
[workspace.dependencies.soroban-env-common]
version = "27.0.0"
git = "https://github.com/sisuresh/rs-soroban-env"
rev = "b51329b6614d1f594e91cbc3f85483f455f9172c"

[workspace.dependencies.soroban-env-guest]
version = "27.0.0"
git = "https://github.com/sisuresh/rs-soroban-env"
rev = "b51329b6614d1f594e91cbc3f85483f455f9172c"

[workspace.dependencies.soroban-env-host]
version = "27.0.0"
git = "https://github.com/sisuresh/rs-soroban-env"
rev = "b51329b6614d1f594e91cbc3f85483f455f9172c"

[workspace.dependencies.stellar-strkey]
version = "=0.0.16"

# SPIKE: Protocol 28 (CAP-0084) pins stellar-xdr to the unmerged
# rs-stellar-xdr#552 branch commit, referenced via sisuresh/rs-stellar-xdr
# (fork-hosted branch p28-cap-0084; per-cap layout, self-reports 28.0.0).
# Productionize -> stellar/rs-stellar-xdr merged SHA (or crates.io 28.0.0).
[workspace.dependencies.stellar-xdr]
version = "=28.0.0"
git = "https://github.com/sisuresh/rs-stellar-xdr"
rev = "cf7fdedf7ca95fccf45c82e6829d14637c9b5e4c"
default-features = false

# SPIKE: Protocol 28 (CAP-0084) the pinned rs-soroban-env#1700 env crates
# transitively depend on stellar-xdr from sisuresh/rs-stellar-xdr at the SAME
# rev (cf7fdedf) as the direct workspace dep above, so the git source is already
# unified and no [patch] redirect is needed (a sisuresh->sisuresh patch would be
# a self-patch). Restore a patch to stellar/rs-stellar-xdr once #552 lands there.
# [patch."https://github.com/sisuresh/rs-stellar-xdr"]
# stellar-xdr = { git = "https://github.com/stellar/rs-stellar-xdr", rev = "cf7fdedf7ca95fccf45c82e6829d14637c9b5e4c", default-features = false }

#[patch.crates-io]
#soroban-env-common = { path = "../rs-soroban-env/soroban-env-common" }
#soroban-env-guest = { path = "../rs-soroban-env/soroban-env-guest" }
#soroban-env-host = { path = "../rs-soroban-env/soroban-env-host" }
#[patch."https://github.com/stellar/rs-stellar-xdr"]
#stellar-xdr = { path = "../rs-stellar-xdr/" }

[profile.dev]
overflow-checks = true
panic = "abort"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true

# The release-without-lto profile is useful for testing build cases when lto
# are disabled, such as those like the test_zero test vector. See the test_zero
# README for more details.
[profile.release-without-lto]
inherits = "release"
lto = "off"

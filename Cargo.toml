[workspace]
resolver = "2"

members = [
    "soroban-sdk",
    "soroban-sdk-macros",
    "soroban-meta",
    "soroban-spec",
    "soroban-spec-rust",
    "soroban-ledger-snapshot",
    "soroban-token-sdk",
    "soroban-token-spec",
    "stellar-asset-spec",
    "tests/*",
]

[workspace.package]
version = "27.0.0-rc.1"
rust-version = "1.91.0"

[workspace.dependencies]
soroban-sdk = { version = "27.0.0-rc.1", path = "soroban-sdk" }
soroban-sdk-macros = { version = "27.0.0-rc.1", path = "soroban-sdk-macros" }
soroban-meta = { version = "27.0.0-rc.1", path = "soroban-meta" }
soroban-spec = { version = "27.0.0-rc.1", path = "soroban-spec" }
soroban-spec-rust = { version = "27.0.0-rc.1", path = "soroban-spec-rust" }
soroban-ledger-snapshot = { version = "27.0.0-rc.1", path = "soroban-ledger-snapshot" }
soroban-token-sdk = { version = "27.0.0-rc.1", path = "soroban-token-sdk" }
soroban-token-spec = { version = "27.0.0-rc.1", path = "soroban-token-spec" }
stellar-asset-spec = { version = "27.0.0-rc.1", path = "stellar-asset-spec" }

# SPIKE: Protocol 28 (CAP-0084) pins the three env crates to the unmerged
# rs-soroban-env#1696 fork branch. Productionize -> stellar/rs-soroban-env
# merged SHA (or a released version) once it lands; restore `version =` only.
[workspace.dependencies.soroban-env-common]
version = "=27.0.0"
git = "https://github.com/sisuresh/rs-soroban-env"
rev = "8cf4f5e1580b86d65529e6ed4f78b734908c62fa"

[workspace.dependencies.soroban-env-guest]
version = "=27.0.0"
git = "https://github.com/sisuresh/rs-soroban-env"
rev = "8cf4f5e1580b86d65529e6ed4f78b734908c62fa"

[workspace.dependencies.soroban-env-host]
version = "=27.0.0"
git = "https://github.com/sisuresh/rs-soroban-env"
rev = "8cf4f5e1580b86d65529e6ed4f78b734908c62fa"

[workspace.dependencies.stellar-strkey]
version = "=0.0.16"

# SPIKE: Protocol 28 (CAP-0084) pins stellar-xdr to the unmerged
# rs-stellar-xdr#549 fork branch (per-cap layout, self-reports 28.0.0).
# Productionize -> stellar/rs-stellar-xdr merged SHA (or crates.io 28.0.0).
[workspace.dependencies.stellar-xdr]
version = "=28.0.0"
git = "https://github.com/sisuresh/rs-stellar-xdr"
rev = "7b46a60d914c1e5befd6a2d2c50d2fdf7e5eb1f0"
default-features = false

#[patch.crates-io]
#soroban-env-common = { path = "../rs-soroban-env/soroban-env-common" }
#soroban-env-guest = { path = "../rs-soroban-env/soroban-env-guest" }
#soroban-env-host = { path = "../rs-soroban-env/soroban-env-host" }
#[patch."https://github.com/stellar/rs-stellar-xdr"]
#stellar-xdr = { path = "../rs-stellar-xdr/" }

[profile.dev]
overflow-checks = true
panic = "abort"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true

# The release-without-lto profile is useful for testing build cases when lto
# are disabled, such as those like the test_zero test vector. See the test_zero
# README for more details.
[profile.release-without-lto]
inherits = "release"
lto = "off"
